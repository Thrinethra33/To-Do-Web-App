<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkillCraft Technology - Task 04</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-container">
        <header>
            <div class="task-badge">TASK 04</div>
            <h1>TO-DO <span>WEB APP</span></h1>
        </header>

        <form id="todo-form" class="todo-input-area">
            <div class="input-row">
                <input type="text" id="task-title" placeholder="What needs to be done?" required />
            </div>
            <div class="input-row datetime-row">
                <input type="datetime-local" id="task-datetime" required />
                <button type="submit" id="submit-btn" class="btn-primary">Add Task</button>
            </div>
        </form>

        <div class="list-management">
            <span class="list-heading">Your Tasks</span>
            <div class="filter-buttons">
                <button class="filter-btn active" data-filter="all">All</button>
                <button class="filter-btn" data-filter="pending">Pending</button>
                <button class="filter-btn" data-filter="completed">Completed</button>
            </div>
        </div>

        <ul id="task-list" class="task-list"></ul>

        <div id="empty-state" class="empty-state">
            <p>No tasks found. Add a task above to get started!</p>
        </div>

        <footer>
            SkillCraft Technology
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
